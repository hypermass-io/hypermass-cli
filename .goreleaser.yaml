version: 2
project_name: hypermass

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: hypermass
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X hypermass-cli/app_constants.HypermassCliVersion={{.Version}}
      - -X hypermass-cli/app_constants.Commit={{.Commit}}
      - -X hypermass-cli/app_constants.BuildDate={{.CommitDate}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '(?i)merge'
